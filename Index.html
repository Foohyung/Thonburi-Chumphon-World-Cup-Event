<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ทายผลบอลโลก 2026: อาร์เจนตินา vs สเปน</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0ea5e9 0%, #ec4899 100%);
      --glass-bg: rgba(255, 255, 255, 0.15);
      --glass-border: rgba(255, 255, 255, 0.3);
      --primary: #fbcfe8; /* Light pink */
      --arg-color: #43a1d5;
      --esp-color: #c60b1e;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: 'Kanit', sans-serif;
      background: var(--bg-gradient);
      color: #fff;
      min-height: 100vh;
      display: block;
      overflow-x: hidden;
      padding: 40px 20px;
      box-sizing: border-box;
    }

    /* Ambient Background Effects */
    .ambient-light {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      animation: float 10s infinite ease-in-out alternate;
    }
    
    .light-arg {
      background: rgba(67, 161, 213, 0.2);
      width: 300px; height: 300px;
      top: 10%; left: -50px;
    }

    .light-esp {
      background: rgba(198, 11, 30, 0.2);
      width: 300px; height: 300px;
      bottom: 10%; right: -50px;
      animation-delay: -5s;
    }

    @keyframes float {
      0% { transform: translateY(0) scale(1); }
      100% { transform: translateY(30px) scale(1.1); }
    }

    .container {
      width: 100%;
      max-width: 420px; /* Optimized for mobile */
      margin: 0 auto;
      position: relative;
      z-index: 10;
    }

    .glass-card > *:not(#dynamicBg) {
      position: relative;
      z-index: 2;
    }
    #dynamicBg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0;
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      background-size: cover;
      background-position: center;
      filter: blur(4px);
      transform: scale(1.1);
      pointer-events: none;
      border-radius: 24px;
    }
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 35px 25px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
      transform: translateZ(0);
      transition: all 0.5s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .main-logo {
      width: 90px;
      height: 90px;
      margin: 0 auto 15px auto;
      display: block;
      border-radius: 22px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      background: #fff;
      padding: 8px;
      object-fit: contain;
    }

    .header-title {
      text-align: center;
      font-size: 22px;
      line-height: 1.4;
      padding-bottom: 5px;
      font-weight: 700;
      margin: 0 0 5px 0;
      background: linear-gradient(to right, #ffffff, #fbcfe8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 2px 10px rgba(251, 207, 232, 0.3);
    }

    .subtitle {
      text-align: center;
      color: #ffecf9;
      font-size: 14px;
      margin-bottom: 30px;
      font-weight: 400;
      text-shadow: 0 1px 8px rgba(255, 236, 249, 0.45);
    }

    .matchup {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 20px;
    }

    .team {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      cursor: pointer;
      padding: 10px;
      border-radius: 16px;
      border: 2px solid transparent;
      transition: all 0.35s ease;
      position: relative;
      overflow: visible;
    }

    .team.selected {
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 18px 35px rgba(0, 0, 0, 0.18);
      animation: balloonFloat 3s ease-in-out infinite;
    }
    .team.selected::before {
      content: '';
      position: absolute;
      top: -34px;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 36px;
      border-radius: 50% 50% 45% 45%;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.35);
      box-shadow: inset -3px -4px 10px rgba(255, 255, 255, 0.18);
      pointer-events: none;
      z-index: 1;
    }
    .team.selected::after {
      content: '';
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 2px;
      height: 26px;
      background: rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      pointer-events: none;
      z-index: 1;
    }
    .team-arg.selected { border-color: var(--arg-color); }
    .team-esp.selected { border-color: var(--esp-color); }

    .flag-container {
      position: relative;
    }

    .flag {
      width: 75px;
      height: 75px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255,255,255,0.2);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .team.selected .flag {
      transform: scale(1.08) translateY(-8px);
    }
    .team-arg.selected .flag { box-shadow: 0 10px 30px rgba(67, 161, 213, 0.55); }
    .team-esp.selected .flag { box-shadow: 0 10px 30px rgba(198, 11, 30, 0.55); }

    @keyframes balloonFloat {
      0% { opacity: 0.8; transform: translateY(0) translateX(0); }
      25% { opacity: 1; transform: translateY(-8px) translateX(-4px); }
      50% { transform: translateY(-14px) translateX(2px); }
      75% { transform: translateY(-10px) translateX(-3px); }
      100% { transform: translateY(-12px) translateX(0); }
    }

    .score-label {
      font-size: 14px;
      color: #fee2e2;
      margin-bottom: 12px;
      opacity: 1;
      font-weight: 600;
      letter-spacing: 0.15em;
      background: rgba(248, 113, 113, 0.18);
      padding: 10px 14px;
      border-radius: 14px;
      display: inline-block;
      box-shadow: 0 0 18px rgba(248, 113, 113, 0.2);
    }

    .team-name {
      margin-top: 12px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .vs {
      font-size: 22px;
      font-weight: 700;
      color: #94a3b8;
      margin: 0 10px;
      animation: pulse 2s infinite;
      padding-bottom: 25px; /* Alignment adjustment */
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.15); opacity: 1; color: var(--primary); text-shadow: 0 0 10px var(--primary); }
      100% { transform: scale(1); opacity: 0.7; }
    }

    .prediction-box {
      margin-top: 35px;
      text-align: center;
    }

    .score-inputs {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin-bottom: 30px;
    }

    .score-input {
      width: 65px;
      height: 75px;
      background: rgba(0,0,0,0.2);
      border: 2px solid var(--glass-border);
      border-radius: 16px;
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      font-family: 'Kanit', sans-serif;
      transition: all 0.3s ease;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
    }

    /* Remove arrows for input type number */
    .score-input::-webkit-outer-spin-button,
    .score-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .score-input[type=number] {
      -moz-appearance: textfield;
    }

    .score-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 20px rgba(245, 158, 11, 0.4), inset 0 2px 5px rgba(0,0,0,0.2);
      background: rgba(0,0,0,0.4);
      transform: translateY(-2px);
    }

    .colon {
      font-size: 22px;
      line-height: 1.4;
      padding-bottom: 5px;
      font-weight: bold;
      color: #64748b;
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #0ea5e9, #db2777);
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      font-family: 'Kanit', sans-serif;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(219, 39, 119, 0.4);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .submit-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(234, 88, 12, 0.6);
    }

    .submit-btn:active {
      transform: translateY(1px);
    }

    .submit-btn::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
      transform: rotate(45deg);
      transition: all 0.3s ease;
      opacity: 0;
    }

    .submit-btn:hover::after {
      animation: shine 1.5s ease-out infinite;
    }

    .flag-float {
      position: fixed;
      bottom: -48px;
      width: 42px;
      height: 28px;
      border-radius: 12px;
      object-fit: cover;
      box-shadow: 0 12px 24px rgba(0,0,0,0.2);
      opacity: 0;
      pointer-events: none;
      z-index: 1500;
      filter: drop-shadow(0 6px 14px rgba(0,0,0,0.18));
      animation: flagFloatUp 3s ease-out forwards;
    }

    @keyframes flagFloatUp {
      0% { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0.15; }
      20% { opacity: 1; }
      40% { transform: translateY(-120px) translateX(-8px) rotate(-10deg); }
      60% { transform: translateY(-240px) translateX(8px) rotate(8deg); }
      80% { transform: translateY(-360px) translateX(-6px) rotate(-6deg); }
      100% { transform: translateY(-480px) translateX(0) rotate(0deg); opacity: 0; }
    }

    @keyframes shine {
      0% { left: -100%; opacity: 0; }
      20% { opacity: 1; }
      100% { left: 100%; opacity: 0; }
    }

    .user-info {
      margin-bottom: 20px;
    }
    
    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 30px 25px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      transform: scale(0.9);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .modal-overlay.active .modal-card {
      transform: scale(1);
    }

    .modal-title {
      margin: 0 0 5px 0;
      font-size: 22px;
      color: #fff;
      text-align: center;
    }

    .modal-subtitle {
      margin: 0 0 20px 0;
      font-size: 14px;
      color: #94a3b8;
      text-align: center;
    }
    
    .modal-actions {
      display: flex;
      gap: 15px;
      margin-top: 5px;
    }
    
    .btn-cancel {
      flex: 1;
      padding: 12px;
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--glass-border);
      color: #fff;
      border-radius: 12px;
      font-family: 'Kanit', sans-serif;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .btn-cancel:hover {
      background: rgba(255,255,255,0.2);
    }
    
    .btn-confirm {
      flex: 1;
      padding: 12px;
      background: linear-gradient(135deg, #0ea5e9, #db2777);
      border: none;
      color: #fff;
      border-radius: 12px;
      font-family: 'Kanit', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(219, 39, 119, 0.3);
    }

    .btn-confirm:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(234, 88, 12, 0.5);
    }
    .input-group {
      margin-bottom: 15px;
      text-align: left;
    }
    .input-group label {
      display: block;
      font-size: 14px;
      color: #cbd5e1;
      margin-bottom: 6px;
      font-weight: 400;
    }
    .input-group input, .input-group select {
      width: 100%;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 12px 15px;
      color: #fff;
      font-family: 'Kanit', sans-serif;
      font-size: 16px;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }
    .input-group input:focus, .input-group select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(245, 158, 11, 0.3);
      background: rgba(0,0,0,0.3);
    }
    .input-group input::placeholder {
      color: #64748b;
    }
    .input-group select {
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23cbd5e1%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat;
      background-position: right 15px top 50%;
      background-size: 12px auto;
    }
    .input-group select option {
      background: #0f172a;
      color: #fff;
    }

    .footer-text {
      text-align: center;
      font-size: 12px;
      color: #64748b;
      margin-top: 25px;
      opacity: 0.7;
    }

    /* Loading Overlay */
    .loading-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .loading-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .spinner {
      width: 45px;
      height: 45px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.55, 0.15, 0.45, 0.85) infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 15px;
      font-size: 16px;
      color: #fff;
      font-weight: 500;
      letter-spacing: 1px;
      animation: pulseText 1.5s infinite;
    }

    @keyframes pulseText {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* Success Message Styles */
    .success-container {
      animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes scaleIn {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .success-icon {
      width: 60px;
      height: 60px;
      background: rgba(74, 222, 128, 0.2);
      color: #4ade80;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin: 0 auto 15px auto;
      border: 2px solid rgba(74, 222, 128, 0.4);
    }
  </style>
</head>

AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA3XgYKAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAwPaRugAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAbN70CQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAdk5+BQAAAAAARho5CQAAAAAAAAAAAAAAAAAAAAAAACBqJbbZc3cB" alt="TCH Logo" class="main-logo" id="logoImg">
      <h1 class="header-title">กิจกรรมทายผลฟุตบอลโลก</h1>
      <div class="subtitle">นัดชิงชนะเลิศ</div>


      <div class="matchup">
        <div class="team team-arg" onclick="selectTeam('arg')">
          <div class="flag-container">
            <img src="https://flagcdn.com/w320/ar.png" alt="Argentina" class="flag">
          </div>
          <div class="team-name">อาร์เจนตินา</div>
        </div>

        <div class="vs">VS</div>

        <div class="team team-esp" onclick="selectTeam('esp')">
          <div class="flag-container">
            <img src="https://flagcdn.com/w320/es.png" alt="Spain" class="flag">
          </div>
          <div class="team-name">สเปน</div>
        </div>
      </div>

      <div class="prediction-box" id="predictionBox">
        <div id="scoreArea" style="opacity: 0; transform: translateY(-10px); transition: all 0.3s ease; pointer-events: none; margin-bottom: 25px;">
          <div class="score-label">ทายผลสกอร์ (ไม่บังคับ)</div>
          <div class="score-inputs" style="margin-bottom: 0;">
            <input type="number" id="argScore" class="score-input" min="0" max="20" placeholder="-" autocomplete="off">
            <span class="colon">:</span>
            <input type="number" id="espScore" class="score-input" min="0" max="20" placeholder="-" autocomplete="off">
          </div>
        </div>
        
        <button class="submit-btn" onclick="submitForm()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
          </svg>
          ยืนยันการทายผล
        </button>
      </div>


      <!-- Loading Overlay inside the card -->
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">กำลังบันทึกข้อมูล...</div>
      </div>
    </div>
  </div>

  <!-- User Info Modal -->
  <div class="modal-overlay" id="userInfoModal">
    <div class="modal-card">
      <h3 class="modal-title">ข้อมูลพนักงาน</h3>
      <p class="modal-subtitle">กรุณากรอกข้อมูลเพื่อบันทึกผลการทาย</p>
      
      <div class="user-info">
        <div class="input-group">
          <label>รหัสพนักงาน</label>
          <input type="text" id="empId" placeholder="เช่น 12345" autocomplete="off">
        </div>
        <div class="input-group">
          <label>ชื่อ-นามสกุล</label>
          <input type="text" id="empName" placeholder="เช่น สมชาย ใจดี" autocomplete="off">
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">ยกเลิก</button>
        <button class="btn-confirm" onclick="confirmSubmission()">บันทึกข้อมูล</button>
      </div>
    </div>
  </div>

  <script>
    let selectedTeam = '';

    function selectTeam(team) {
      document.querySelectorAll('.team').forEach(el => el.classList.remove('selected'));
      document.querySelector('.team-' + team).classList.add('selected');
      selectedTeam = team;
      
      const scoreArea = document.getElementById('scoreArea');
      scoreArea.style.opacity = '1';
      scoreArea.style.pointerEvents = 'all';
      scoreArea.style.transform = 'translateY(0)';

      const glassCard = document.querySelector('.glass-card');
      
      if (team === 'arg') {
        glassCard.style.boxShadow = '0 0 50px rgba(67, 161, 213, 0.4)';
        glassCard.style.borderColor = 'rgba(67, 161, 213, 0.5)';
      } else if (team === 'esp') {
        glassCard.style.boxShadow = '0 0 50px rgba(198, 11, 30, 0.4)';
        glassCard.style.borderColor = 'rgba(198, 11, 30, 0.5)';
      }
    }

    function submitForm() {
      if (!selectedTeam) {
        alert('กรุณาเลือกทีมที่คาดว่าจะชนะ');
        return;
      }
      document.getElementById('userInfoModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('userInfoModal').classList.remove('active');
    }

    function confirmSubmission() {
      const empId = document.getElementById('empId').value.trim();
      const empName = document.getElementById('empName').value.trim();
      const argScore = document.getElementById('argScore').value;
      const espScore = document.getElementById('espScore').value;

      if (!empId || !empName) {
        alert('กรุณากรอกข้อมูลพนักงานให้ครบถ้วน');
        return;
      }

      document.getElementById('userInfoModal').classList.remove('active');
      const overlay = document.getElementById('loadingOverlay');
      overlay.classList.add('active');

      const data = {
        empId: empId,
        empName: empName,
        winner: selectedTeam,
        arg: argScore || null,
        esp: espScore || null
      };

      fetch('/api/submit', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
      })
      .then(async response => {
        overlay.classList.remove('active');
        const result = await response.json();
        if (!response.ok) {
          throw new Error(result.error || 'เกิดข้อผิดพลาด');
        }
        handleSuccess(empName, selectedTeam, argScore, espScore);
      })
      .catch(error => {
        overlay.classList.remove('active');
        alert('เกิดข้อผิดพลาด: ' + (error.message || error));
      });
    }

    function handleSuccess(empName, winner, argScore, espScore) {
      const overlay = document.getElementById('loadingOverlay');
      overlay.classList.remove('active');
      
      triggerConfetti();
      triggerFlagFloat(winner);
      
      const predictionBox = document.getElementById('predictionBox');
      predictionBox.innerHTML = `
        <div class="success-container">
          <div class="success-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
          <h3 style="color: #4ade80; margin: 0 0 10px 0; font-size: 22px;">บันทึกผลสำเร็จ!</h3>
          <p style="color: #cbd5e1; margin: 0; font-size: 16px;">
            ขอบคุณครับ <b>${empName}</b><br><br>
            คุณทายผลว่า: <br>
            <span style="color: #fff; font-weight: 600; font-size: 18px; display: inline-block; margin-top: 5px;">
              ทายผลว่า: <b>${winner === 'arg' ? 'อาร์เจนตินา' : 'สเปน'} ชนะ!</b>
              ${(argScore !== '' && espScore !== '') ? `<br><span style="color: #fbcfe8; font-size: 15px; font-weight: 400; margin-top: 5px; display: inline-block;">(ด้วยสกอร์ ${argScore} - ${espScore})</span>` : ''}
            </span>
          </p>
        </div>
      `;
    }

    function triggerConfetti() {
      var duration = 3 * 1000;
      var animationEnd = Date.now() + duration;
      var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 1000 };

      function randomInRange(min, max) {
        return Math.random() * (max - min) + min;
      }

      var interval = setInterval(function() {
        var timeLeft = animationEnd - Date.now();

        if (timeLeft <= 0) {
          return clearInterval(interval);
        }

        var particleCount = 50 * (timeLeft / duration);
        // since particles fall down, start a bit higher than random
        confetti(Object.assign({}, defaults, { particleCount,
          origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 }
        }));
        confetti(Object.assign({}, defaults, { particleCount,
          origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 }
        }));
      }, 250);
    }

    function triggerFlagFloat(winner) {
      var container = document.getElementById('flagFloatContainer');
      var flagUrl = winner === 'arg'
        ? 'https://flagcdn.com/w80/ar.png'
        : 'https://flagcdn.com/w80/es.png';

      for (var i = 0; i < 10; i++) {
        var flag = document.createElement('img');
        flag.src = flagUrl;
        flag.className = 'flag-float';
        flag.style.left = (10 + Math.random() * 80) + '%';
        flag.style.animationDuration = (2.8 + Math.random() * 0.8) + 's';
        flag.style.animationDelay = (Math.random() * 0.3) + 's';
        flag.style.transform = 'translateX(0) rotate(' + (Math.random() * 20 - 10) + 'deg)';
        container.appendChild(flag);

        flag.addEventListener('animationend', function() {
          if (this.parentNode) {
            this.parentNode.removeChild(this);
          }
        });
      }
    }
  </script>
</body>
</html>
